<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Control | Talleres Holismo</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Quicksand', sans-serif; padding: 40px; background: #f4f7f6; }
        .admin-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); max-width: 800px; margin: auto; }
        .taller-row { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid #eee; align-items: center; }
        button { padding: 10px 20px; border-radius: 25px; border: none; cursor: pointer; font-weight: bold; }
        .btn-add { background: #8DA18E; color: white; margin-bottom: 20px; }
        .btn-edit { background: #3A7BD5; color: white; }
        /* Panel de edición oculto */
        #form-container { display: none; background: #f9f9f9; padding: 20px; border-radius: 15px; margin-top: 20px; border: 1px solid #ddd; }
        .input-field { width: 100%; padding: 10px; margin: 5px 0 15px 0; border: 1px solid #ccc; border-radius: 5px; }
    </style>
</head>
<body>

<div class="admin-card">
    <h1>Administrador de Talleres</h1>
    <button class="btn-add" onclick="mostrarFormulario()">+ Crear Nuevo Taller</button>
    
    <div id="form-container">
        <h3 id="form-title">Nuevo Taller</h3>
        <input type="hidden" id="edit-id">
        <input type="text" id="titulo" class="input-field" placeholder="Título del Taller">
        <textarea id="info" class="input-field" placeholder="Descripción"></textarea>
        <input type="text" id="linkAula" class="input-field" placeholder="Link al Aula">
        <button class="btn-add" onclick="guardarTaller()">Guardar Cambios</button>
        <button onclick="ocultarFormulario()">Cancelar</button>
    </div>

    <div id="lista-talleres">
        </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs, addDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCP5lzu3R4RPVoFEo06l65Iw7tRNqMRqlc",
        authDomain: "holismotalleres.firebaseapp.com",
        projectId: "holismotalleres",
        storageBucket: "holismotalleres.firebasestorage.app",
        messagingSenderId: "424049247991",
        appId: "1:424049247991:web:e3ea92fbd96d7e2b2d35f2",
        measurementId: "G-F2ENK6YHSC"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    window.db = db;

    // Cargar lista al abrir
    async function cargarTalleres() {
        const querySnapshot = await getDocs(collection(db, "talleres"));
        const lista = document.getElementById("lista-talleres");
        lista.innerHTML = "";
        querySnapshot.forEach((doc) => {
            const t = doc.data();
            lista.innerHTML += `
                <div class="taller-row">
                    <span>${t.titulo}</span>
                    <button class="btn-edit" onclick="editarTaller('${doc.id}', '${t.titulo}', '${t.info}', '${t.linkAula}')">Editar</button>
                </div>`;
        });
    }

    // Guardar o Actualizar
    window.guardarTaller = async () => {
        const id = document.getElementById('edit-id').value;
        const data = {
            titulo: document.getElementById('titulo').value,
            info: document.getElementById('info').value,
            linkAula: document.getElementById('linkAula').value
        };

        if (id) {
            await updateDoc(doc(db, "talleres", id), data);
        } else {
            await addDoc(collection(db, "talleres"), data);
        }
        ocultarFormulario();
        cargarTalleres();
    };

    window.mostrarFormulario = () => document.getElementById('form-container').style.display = 'block';
    window.ocultarFormulario = () => document.getElementById('form-container').style.display = 'none';
    
    window.editarTaller = (id, titulo, info, link) => {
        document.getElementById('edit-id').value = id;
        document.getElementById('titulo').value = titulo;
        document.getElementById('info').value = info;
        document.getElementById('linkAula').value = link;
        document.getElementById('form-title').innerText = "Editando Taller";
        mostrarFormulario();
    };

    cargarTalleres();
</script>

</body>
</html>
