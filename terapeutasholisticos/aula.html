        const idTaller = urlParams.get('id');

        async function cargarContenidoMaestro() {
            if (!idTaller) {
                document.getElementById('titulo-taller').innerText = "Error: Taller no seleccionado";
                return;
            }

            // 1. Cargar info general del taller
            const tallerDoc = await getDoc(doc(db, "talleres", idTaller));
            if (tallerDoc.exists()) {
                document.getElementById('titulo-taller').innerText = tallerDoc.data().titulo;
                document.getElementById('descripcion-taller').innerText = tallerDoc.data().info;
            }
