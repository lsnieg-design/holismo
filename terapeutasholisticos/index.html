<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula Virtual | Formación Terapeutas Holísticos</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --azul: #3A7BD5; --verde: #8DA18E; --salmon: #E5A88A; --crema: #FDFBF7; --gris-bloqueo: #bdc3c7; }
        body { background: #f8f9fa; font-family: 'Quicksand', sans-serif; margin: 0; display: flex; flex-direction: column; }
        
        .header-movil { display: none; background: white; padding: 15px 20px; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 10002; border-bottom: 1px solid #eee; }
        .sidebar-aula { width: 320px; background: white; height: 100vh; position: fixed; left: 0; top: 0; border-right: 1px solid #eee; overflow-y: auto; z-index: 10001; transition: 0.3s; }
        .sidebar-header { padding: 30px; border-bottom: 1px solid #f0f0f0; text-align: center; }
        .sidebar-header img { width: 120px; }
        .lista-encuentros { padding: 0; margin: 0; list-style: none; }
        .item-encuentro { border-bottom: 1px solid #f9f9f9; cursor: pointer; }
        .item-encuentro div { display: block; padding: 18px 25px; color: #777; font-size: 13.5px; transition: 0.3s; border-left: 4px solid transparent; }
        .item-encuentro.activo div { background: #F0F7FF; border-left-color: var(--azul); color: var(--azul); font-weight: 700; }
        
        .contenido-aula { margin-left: 320px; padding: 40px 5%; transition: 0.3s; }
        .seccion-contenido { display: none; max-width: 900px; margin: 0 auto; }
        .seccion-contenido.activa { display: block; animation: fadeIn 0.5s ease; }
        .card-acceso { background: white; padding: 40px; border-radius: 30px; border: 2px solid var(--azul); text-align: center; margin-bottom: 40px; box-shadow: 0 15px 35px rgba(58,123,213,0.1); }
        .btn-zoom { display: inline-flex; align-items: center; gap: 10px; background: var(--azul); color: white; padding: 18px 40px; border-radius: 50px; text-decoration: none; font-weight: 700; font-size: 16px; margin-top: 20px; transition: 0.3s; border:none; cursor:pointer; text-align: center; justify-content: center; }
        .btn-zoom:hover { transform: translateY(-3px); background: #2A5FB0; }
        .info-clase { background: white; padding: 40px; border-radius: 30px; border: 1px solid #eee; margin-bottom: 30px; }
        .info-clase h3 { font-family: 'Lora', serif; color: var(--verde); border-left: 4px solid var(--salmon); padding-left: 15px; margin-top: 30px; }
        .badge-live { display: inline-block; padding: 5px 12px; background: #ffebee; color: #d32f2f; border-radius: 5px; font-size: 11px; font-weight: 800; text-transform: uppercase; margin-bottom: 10px; }
        
        /* Formulario del Editor para Docentes */
        .panel-editor { background: #fff; padding: 30px; border-radius: 30px; border: 2px dashed var(--verde); margin-bottom: 40px; display: none; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .panel-editor h2 { font-family: 'Lora'; color: var(--verde); margin-top: 0; }
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 5px; font-size: 13px; color: #555; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-family: 'Quicksand'; box-sizing: border-box; }
        
        /* Contenedor flexible para enlaces dobles (Nombre + Link) */
        .recurso-inputs { display: flex; gap: 10px; }
        .recurso-inputs input { flex: 1; }

        .btn-publicar { background: var(--verde); color: white; padding: 12px 25px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; font-family: 'Quicksand'; transition: 0.3s; }
        .btn-cancelar-edicion { background: #95a5a6; color: white; padding: 12px 25px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; font-family: 'Quicksand'; margin-left: 10px; }

        @media (max-width: 900px) {
            .header-movil { display: flex; }
            .sidebar-aula { transform: translateX(-100%); width: 280px; }
            .sidebar-aula.abierta { transform: translateX(0); }
            .contenido-aula { margin-left: 0; padding: 20px 5%; }
            .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 10000; }
            .overlay.activa { display: block; }
            .recurso-inputs { flex-direction: column; gap: 5px; } /* En celular se apilan nombre y link */
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="puerta-acceso" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--azul); z-index: 20000; display: flex; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box;">
        <div style="background: white; padding: 40px; border-radius: 40px; max-width: 400px; width: 100%; text-align: center;">
            <img src="../logo.png" style="width: 150px; margin-bottom: 20px;">
            <h2 style="font-family: 'Lora'; color: var(--azul);">Acceso al Aula</h2>
            <input type="password" id="input-password" placeholder="Contraseña" style="width: 100%; padding: 15px; border-radius: 50px; border: 2px solid #eee; margin-bottom: 20px; text-align: center;">
            <button onclick="verificarAcceso()" style="width: 100%; padding: 15px; border-radius: 50px; border: none; background: var(--azul); color: white; font-weight: 700; cursor: pointer;">Ingresar</button>
            <p id="error-msg" style="color: #d32f2f; font-size: 13px; margin-top: 15px; display: none;">Contraseña incorrecta.</p>
        </div>
    </div>

    <div class="header-movil">
        <img src="../logo.png" style="height: 30px;">
        <button onclick="toggleMenu()" style="background:none; border:none; font-size:24px; color:var(--azul);">☰</button>
    </div>

    <div id="overlay" class="overlay" onclick="toggleMenu()"></div>

    <aside id="sidebar" class="sidebar-aula">
        <div class="sidebar-header">
            <a href="../talleres.html" style="text-decoration: none; display: block;">
                <img src="../logo.png" alt="Holismo" style="cursor: pointer; transition: 0.3s;">
                <p style="font-size: 10px; font-weight: 700; color: var(--verde); letter-spacing: 2px; margin-top: 10px;">AULA VIRTUAL</p>
            </a>
        </div>
        <ul class="lista-encuentros" id="contenedor-menu-encuentros">
            <li class="item-encuentro activo" id="menu-home" onclick="mostrarSeccion('home', this)"><div><span class="numero-clase">Inicio</span>Presentación y Objetivos</div></li>
        </ul>
    </aside>

    <main class="contenido-aula" id="bloque-principal-contenidos">
        
        <div id="btn-container-crear" style="display:none; text-align: center; margin-bottom: 30px;">
            <button onclick="abrirFormularioNuevaClase()" style="background: var(--verde); color: white; padding: 15px 35px; border: none; border-radius: 50px; font-weight: bold; font-family: 'Quicksand'; font-size: 16px; cursor: pointer; box-shadow: 0 4px 15px rgba(141, 161, 142, 0.4); transition: 0.3s;">
                ➕ Agregar Nuevo Encuentro
            </button>
        </div>

        <div id="panel-textos-docente" class="panel-editor">
            <h2 id="titulo-panel-editor">Panel Docente: Agregar Nueva Clase</h2>
            <input type="hidden" id="form-edit-id" value="">
            <form id="form-clase-nueva">
                <div class="form-group"><label>Nombre de la Clase / Encuentro:</label><input type="text" id="form-nombre" placeholder="Ej: Encuentro 3: Campo Cuántico" required></div>
                <div class="form-group"><label>Introducción Conceptual:</label><textarea id="form-intro" rows="3" placeholder="Breve resumen o encuadre de la clase..."></textarea></div>
                <div class="form-group"><label>Objetivos de la Clase (Separados por coma):</label><textarea id="form-objetivos" rows="2" placeholder="Objetivo 1, Objetivo 2, Objetivo 3..."></textarea></div>
                <div class="form-group"><label>Ejes de Trabajo:</label><input type="text" id="form-ejes" placeholder="Ej: Resonancia • Epigenética • Campo relacional"></div>
                <div class="form-group"><label>Link de la Grabación (Drive, YouTube o Vimeo):</label><input type="text" id="form-grabacion" placeholder="www.drive.google.com/..."></div>
                <div class="form-group"><label>Link de Zoom (Para próximos vivos):</label><input type="text" id="form-zoom" placeholder="www.zoom.us/j/..."></div>
                
                <div class="form-group">
                    <label>Recurso o Bibliografía 1:</label>
                    <div class="recurso-inputs">
                        <input type="text" id="form-rec1-nombre" placeholder="Nombre del botón (Ej: Descargar PDF)">
                        <input type="text" id="form-rec1-link" placeholder="Link del material">
                    </div>
                </div>
                <div class="form-group">
                    <label>Recurso o Bibliografía 2 (Opcional):</label>
                    <div class="recurso-inputs">
                        <input type="text" id="form-rec2-nombre" placeholder="Nombre del botón">
                        <input type="text" id="form-rec2-link" placeholder="Link del material">
                    </div>
                </div>
                <div class="form-group">
                    <label>Recurso o Bibliografía 3 (Opcional):</label>
                    <div class="recurso-inputs">
                        <input type="text" id="form-rec3-nombre" placeholder="Nombre del botón">
                        <input type="text" id="form-rec3-link" placeholder="Link del material">
                    </div>
                </div>
                
                <button type="button" onclick="publicarOEditarClase()" id="btn-submit-editor" class="btn-publicar">🚀 Publicar Encuentro</button>
                <button type="button" onclick="cancelarEdicionActual()" id="btn-cancel-editor" class="btn-cancelar-edicion">Cancelar</button>
            </form>
        </div>

        <div id="home" class="seccion-contenido activa">
            <div style="background: linear-gradient(135deg, #3A7BD5 0%, #2A5FB0 100%); padding: 60px 50px; border-radius: 40px; color: white; margin-bottom: 50px; position: relative; overflow: hidden;">
                <p style="text-transform: uppercase; letter-spacing: 4px; font-size: 11px; font-weight: 700; opacity: 0.9;">Formación Profesional</p>
                <h1 style="font-family: 'Lora'; font-size: clamp(24px, 5vw, 34px); margin: 10px 0;">Terapia Holística Integrativa en la Práctica Clínica con Discapacidad</h1>
                <div style="width: 70px; height: 5px; background: var(--salmon); margin-top: 30px; border-radius: 10px;"></div>
            </div>
            <div class="info-clase">
                <h2 style="font-family: 'Lora'; color: var(--azul);">Fundamentación</h2>
                <div id="texto-fundamentacion-limpio"></div>
            </div>
            <div class="info-clase" style="background: #fcfcfc;">
                <h2 style="font-family: 'Lora'; color: var(--azul);">Perfil del Profesional al finalizar la formación</h2>
                <div id="texto-perfil-limpio"></div>
            </div>
        </div>

    </main>

    <script>
        // PROGRAMA TEXTUAL COMPLETO EXTRAÍDO DEL PDF OFICIAL
        const programaBaseOriginalInicial = [
            {
                id: "e1", numero: 1, titulo: "La enfermedad y la discapacidad como camino de sentido",
                introduccion: "Introducción a la mirada holística del ser humano, comprendiendo al paciente como una unidad total y analizando cómo el síntoma en la discapacidad puede ser un lenguaje con sentido dentro del sistema familiar.",
                objetivos: ["Diferenciar limitación funcional de sentido biológico.", "Introducir la mirada holística integrativa en la práctica clínica diaria."],
                ejes: "Mirada holística • Déficit vs Sentido • El niño portador de información sistémica.",
                linkGrabacion: "https://drive.google.com/file/d/1N6s-dRKIN0KRXsZgP3QFuRvxewN4V9j-/preview", linkZoom: "",
                rec1Nombre: "Descargar Bibliografía Eje",
                rec1Link: "https://www.u-cursos.cl/diplomados/2008/0/DIPDGP/1/material_docente/bajar?id_material=181945",
                libro: "La enfermedad como camino - Dethlefsen & Dahlke"
            },
            {
                id: "e2", numero: 2, titulo: "Conciencia, intención y coherencia en la práctica profesional",
                introduccion: "Analizaremos cómo la presencia, la coherencia interna y la mentalidad del profesional actúan como factores de sanación dentro del encuadre clínico.",
                objetivos: ["Incorporar la coherencia cardíaca y la autorregulación en la práctica diaria.", "Diferenciar el plano del 'Estar' frente al 'Ser' durante la consulta."],
                ejes: "Pensamiento como frecuencia • Campo relacional y resonancia • Coherencia interna.",
                linkGrabacion: "https://drive.google.com/file/d/1N6s-dRKIN0KRXsZgP3QFuRvxewN4V9j-/preview", linkZoom: "",
                rec1Nombre: "Bibliografía: 7 Leyes",
                rec1Link: "https://www.colomos.ceti.mx/documentos/goe/sieteLeyesEspiritualesdelExito.pdf",
                libro: "Las 7 leyes espirituales del éxito - Deepak Chopra"
            },
            {
                id: "e3", numero: 3, titulo: "Presencia y no-juicio: base de la actitud terapéutica",
                introduccion: "La presencia absoluta como pilar fundamental para sostener una intervención ética, consciente y respetuosa ante situaciones de alta vulnerabilidad emocional.",
                objetivos: ["Consolidar el espacio de no-juicio en el acompañamiento a las familias.", "Reconocer la diferencia clínica entre la neutralidad compasiva y la indiferencia."],
                ejes: "Escucha profunda • El no-juicio terapéutico • Resonancia consciente • Atención al presente.",
                linkGrabacion: "", linkZoom: "", libro: "El poder del ahora - Eckhart Tolle"
            },
            {
                id: "e4", numero: 4, titulo: "Creencias, acuerdos internos y vínculo terapéutico",
                introduccion: "Exploración de las creencias limitantes y los acuerdos invisibles que condicionan las proyecciones del terapeuta, el paciente y el entorno de la discapacidad.",
                objetivos: ["Romper diagnósticos rígidos a través de la apertura vincular.", "Analizar el impacto de la impecabilidad de la palabra en la discapacidad."],
                ejes: "Ciclo pensamiento-sentimiento • Proyecciones y expectativas • Comunicación en equipos.",
                linkGrabacion: "", linkZoom: "", libro: "Los cuatro acuerdos - Don Miguel Ruiz"
            },
            {
                id: "e5", numero: 5, titulo: "Diálogo interno, emoción y acompañamiento terapéutico",
                introduccion: "Abordaje del diálogo interno y las estructuras emocionales como respuestas biológicas protectoras frente al trauma y las crisis de desarrollo.",
                objetivos: ["Desarrollar herramientas de integración de las emociones.", "Fortalecer el rol del terapeuta como facilitador de corregulación emocional."],
                ejes: "Conflictos internos • El arte de acompañar sin invadir • Sostén de la carga emocional.",
                linkGrabacion: "", linkZoom: "", libro: "La silla vacía - Mike Boxhall"
            },
            {
                id: "e6", numero: 6, titulo: "Las 5 Leyes Biológicas y Órdenes de la Ayuda",
                introduccion: "Análisis de las dinámicas sistémicas y de las leyes de la naturaleza que ordenan el equilibrio relacional entre el terapeuta, el niño y su red familiar.",
                objetivos: ["Identificar desórdenes sistémicos en los cuadros clínicos de discapacidad.", "Evitar dinámicas inconscientes de sobre-responsabilidad o salvataje."],
                ejes: "Lugar del niño • Leyes de Hamer aplicadas • Dar y Tomar en la consulta • Ética del ayudar.",
                linkGrabacion: "", linkZoom: "", libro: "Los órdenes de la ayuda - Bert Hellinger"
            },
            {
                id: "e7", numero: 7, titulo: "Sanación emocional, cuerpo y energía",
                introduccion: "Estudio de la memoria somática: la huella energética y corporal que el trauma estanca en la biología y las técnicas conscientes para su liberación.",
                objetivos: ["Aplicar técnicas holísticas de conciencia y descarga somática en la sesión.", "Comprender los mapas y centros de energía del sistema nervioso autónomo."],
                ejes: "Teoría polivagal • Huella del trauma biológico • Conciencia del cuerpo • Liberación de bloqueos.",
                linkGrabacion: "", linkZoom: "", libro: "Sanar las emociones - Chris Griscom"
            },
            {
                id: "e8", numero: 8, titulo: "Constelaciones individuales y matrices relacionales",
                introduccion: "Abordaje transgeneracional del síntoma y el uso práctico de plantillas y objetos terapéuticos como herramientas de proyección del inconsciente.",
                objetivos: ["Reconocer lealtades invisibles y repeticiones familiares que detienen el desarrollo.", "Implementar abordajes sistémicos individuales respetando la autonomía familiar."],
                ejes: "Matrices relacionales • Ritmo transgeneracional • Dinámicas familiares • Intervención con plantillas.",
                linkGrabacion: "", linkZoom: "", libro: "Constelaciones individuales y sus matrices relacionales - Dr. Eduardo Fain"
            },
            {
                id: "e9", numero: 9, titulo: "Integración energética y cierre del proceso formativo",
                introduccion: "El campo energético como herramienta diagnóstica y terapéutica complementaria. Cierre pedagógico e integración total de los cuerpos del ser.",
                objetivos: ["Aprender el uso ético, clínico y consciente de la radiestesia básica.", "Lograr la integración final de los planos físico, mental, emocional y energético."],
                ejes: "Radiestesia integral básica • Ética y campo energético • Integración de los cuerpos • Cierre pedagógico.",
                linkGrabacion: "", linkZoom: "", libro: "Radiestesia integral - Ricardo Gerula"
            }
        ];

        if (!localStorage.getItem("registroClasesHolismoUnificado")) {
            localStorage.setItem("registroClasesHolismoUnificado", JSON.stringify(programaBaseOriginalInicial));
        }

        let listaEncuentrosCompleta = JSON.parse(localStorage.getItem("registroClasesHolismoUnificado"));
        let esModoEditor = false;

        document.addEventListener("DOMContentLoaded", () => {
            const parrafosFundacion = [
                "La práctica clínica contemporánea en contextos de discapacidad infantil exige una mirada cada vez más amplia, integradora y respetuosa de la complejidad humana. Como equipo interdisciplinario —nos encontramos diariamente con situaciones que exceden lo estrictamente sintomático, involucrando dimensiones emocionales, vinculares, familiares y sistémicas.",
                "El presente programa propone una formación en Terapia Holística Integrativa orientada a profesionales de la salud, con el objetivo de ampliar la mirada clínica tradicional, incorporando herramientas que permitan comprender al paciente como un ser integral."
            ];
            const itemsPerfil = [
                "Posea una mirada ampliada e integradora del niño y su familia.",
                "Sea capaz de articular su disciplina específica con una comprensión holística sin perder rigor clínico.",
                "Pueda sostener una actitud terapéutica de presencia y no-juicio."
            ];

            document.getElementById("texto-fundamentacion-limpio").innerHTML = parrafosFundacion.map(p => `<p style="line-height:1.9; color:#5A5A5A; text-align:justify; margin-bottom:20px;">${p}</p>`).join("");
            document.getElementById("texto-perfil-limpio").innerHTML = `<ul style="line-height:1.8; color:#5A5A5A; padding-left:20px;">${itemsPerfil.map(item => `<li>${item}</li>`).join("")}</ul>`;

            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('admin') === 'editor') {
                esModoEditor = true;
                document.getElementById('btn-container-crear').style.display = 'block';
            }

            renderizarEstructuraClases();
        });

        function asegurarProtocoloUrl(link) {
            if (!link) return "";
            let enlaceLimpio = link.trim();
            if (enlaceLimpio === "") return "";
            if (!/^https?:\/\//i.test(enlaceLimpio)) {
                enlaceLimpio = "https://" + enlaceLimpio;
            }
            if (enlaceLimpio.includes("drive.google.com") && enlaceLimpio.includes("/view")) {
                enlaceLimpio = enlaceLimpio.replace("/view", "/preview");
            }
            return enlaceLimpio;
        }

        // ABRIR FORMULARIO VACÍO PARA NUEVA CLASE
        function abrirFormularioNuevaClase() {
            document.getElementById('form-edit-id').value = "";
            document.getElementById('form-clase-nueva').reset();
            document.getElementById('titulo-panel-editor').innerText = "Panel Docente: Agregar Nueva Clase";
            document.getElementById('btn-submit-editor').innerText = "🚀 Publicar Encuentro";
            document.getElementById('panel-textos-docente').style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // PUBLICAR O GUARDAR EDICIÓN (Acepta ahora los 3 recursos)
        function publicarOEditarClase() {
            const idEdicion = document.getElementById('form-edit-id').value;
            const nombre = document.getElementById('form-nombre').value;
            const intro = document.getElementById('form-intro').value;
            const objetivos = document.getElementById('form-objetivos').value;
            const ejes = document.getElementById('form-ejes').value;
            
            const grabacion = asegurarProtocoloUrl(document.getElementById('form-grabacion').value);
            const zoom = asegurarProtocoloUrl(document.getElementById('form-zoom').value);
            
            // Los 3 enlaces extra
            const r1Nombre = document.getElementById('form-rec1-nombre').value;
            const r1Link = asegurarProtocoloUrl(document.getElementById('form-rec1-link').value);
            const r2Nombre = document.getElementById('form-rec2-nombre').value;
            const r2Link = asegurarProtocoloUrl(document.getElementById('form-rec2-link').value);
            const r3Nombre = document.getElementById('form-rec3-nombre').value;
            const r3Link = asegurarProtocoloUrl(document.getElementById('form-rec3-link').value);

            if(!nombre) { alert("El nombre de la clase es obligatorio."); return; }

            const nuevaData = {
                titulo: nombre,
                introduccion: intro,
                objetivos: objetivos ? objetivos.split(",") : [],
                ejes: ejes,
                linkGrabacion: grabacion,
                linkZoom: zoom,
                rec1Nombre: r1Nombre,
                rec1Link: r1Link,
                rec2Nombre: r2Nombre,
                rec2Link: r2Link,
                rec3Nombre: r3Nombre,
                rec3Link: r3Link
            };

            if (idEdicion) {
                let index = listaEncuentrosCompleta.findIndex(c => c.id === idEdicion);
                if (index !== -1) {
                    // Mantenemos ID, numero y libro intactos y actualizamos el resto
                    listaEncuentrosCompleta[index] = { ...listaEncuentrosCompleta[index], ...nuevaData };
                    alert("¡Cambios guardados con éxito!");
                }
            } else {
                const idNuevaClase = "dinamica-" + Date.now();
                const nroEncuentro = listaEncuentrosCompleta.length + 1;
                listaEncuentrosCompleta.push({ id: idNuevaClase, numero: nroEncuentro, ...nuevaData });
                alert("¡Nuevo encuentro agregado al programa!");
            }

            localStorage.setItem("registroClasesHolismoUnificado", JSON.stringify(listaEncuentrosCompleta));
            cancelarEdicionActual();
            renderizarEstructuraClases();
        }

        // PRECARGAR FORMULARIO CON CLASE A EDITAR
        function activarModoEditarClase(idClase) {
            const clase = listaEncuentrosCompleta.find(c => c.id === idClase);
            if (!clase) return;

            document.getElementById('form-edit-id').value = clase.id;
            document.getElementById('form-nombre').value = clase.titulo;
            document.getElementById('form-intro').value = clase.introduccion || "";
            document.getElementById('form-objetivos').value = clase.objetivos ? clase.objetivos.join(", ") : "";
            document.getElementById('form-ejes').value = clase.ejes || "";
            document.getElementById('form-grabacion').value = clase.linkGrabacion || "";
            document.getElementById('form-zoom').value = clase.linkZoom || "";
            
            // Cargar datos extra. Soporte legacy para linkBiblio por si quedó guardado viejo
            document.getElementById('form-rec1-nombre').value = clase.rec1Nombre || (clase.linkBiblio ? "Bibliografía" : "");
            document.getElementById('form-rec1-link').value = clase.rec1Link || clase.linkBiblio || "";
            document.getElementById('form-rec2-nombre').value = clase.rec2Nombre || "";
            document.getElementById('form-rec2-link').value = clase.rec2Link || "";
            document.getElementById('form-rec3-nombre').value = clase.rec3Nombre || "";
            document.getElementById('form-rec3-link').value = clase.rec3Link || "";

            document.getElementById('titulo-panel-editor').innerText = `✏️ Editando: Encuentro ${clase.numero}`;
            document.getElementById('btn-submit-editor').innerText = "💾 Guardar Cambios";
            document.getElementById('panel-textos-docente').style.display = 'block';
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // CERRAR FORMULARIO
        function cancelarEdicionActual() {
            document.getElementById('form-edit-id').value = "";
            document.getElementById('form-clase-nueva').reset();
            document.getElementById('panel-textos-docente').style.display = 'none';
        }

        // PINTAR MENÚ Y CONTENIDOS UNIFICADOS EN PANTALLA
        function renderizarEstructuraClases() {
            document.querySelectorAll('.item-dinamico-menu').forEach(el => el.remove());
            document.querySelectorAll('.seccion-dinamica-contenido').forEach(el => el.remove());

            const menuContainer = document.getElementById('contenedor-menu-encuentros');
            const mainContainer = document.getElementById('bloque-principal-contenidos');

            listaEncuentrosCompleta.forEach(clase => {
                const li = document.createElement('li');
                li.className = "item-encuentro item-dinamico-menu";
                li.id = "menu-" + clase.id;
                li.onclick = function() { mostrarSeccion(clase.id, this); };
                li.innerHTML = `<div><span class="numero-clase">Encuentro ${clase.numero}</span>${clase.titulo}</div>`;
                menuContainer.appendChild(li);

                const seccion = document.createElement('div');
                seccion.id = clase.id;
                seccion.className = "seccion-contenido seccion-dinamica-contenido";

                // Armar botones de recursos
                let btnRecursosHTML = '';
                let r1Link = clase.rec1Link || clase.linkBiblio || "";
                let r1Nombre = clase.rec1Nombre || (clase.linkBiblio ? "Bibliografía de Estudio" : "Descargar Recurso 1");
                
                if(r1Link) btnRecursosHTML += `<a href="${r1Link}" target="_blank" class="btn-zoom" style="background: var(--salmon);">${r1Nombre}</a>`;
                if(clase.rec2Link) btnRecursosHTML += `<a href="${clase.rec2Link}" target="_blank" class="btn-zoom" style="background: var(--salmon);">${clase.rec2Nombre || "Recurso 2"}</a>`;
                if(clase.rec3Link) btnRecursosHTML += `<a href="${clase.rec3Link}" target="_blank" class="btn-zoom" style="background: var(--salmon);">${clase.rec3Nombre || "Recurso 3"}</a>`;

                let bloqueAcceso = '';
                if(clase.linkGrabacion) {
                    bloqueAcceso = `
                        <div class="card-acceso" style="padding: 30px;">
                            <span class="badge-live" style="background: var(--azul); color: white;">Grabación disponible</span>
                            <h2 style="font-family:'Lora'; color:var(--azul); margin: 20px 0;">${clase.titulo}</h2>
                            <div style="width: 100%; position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 20px; margin-bottom: 30px;">
                                <iframe src="${clase.linkGrabacion}" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border:0;" allowfullscreen></iframe>
                            </div>
                            <div style="display: flex; gap: 15px; justify-content: center; flex-wrap: wrap;">
                                ${btnRecursosHTML}
                            </div>
                        </div>`;
                } else {
                    bloqueAcceso = `
                        <div class="card-acceso">
                            <span class="badge-live">Próximamente En Vivo</span>
                            <h2 style="font-family: 'Lora'; color: var(--azul); margin: 10px 0;">${clase.titulo}</h2>
                            <div style="display: flex; gap: 15px; justify-content: center; flex-wrap: wrap;">
                                ${clase.linkZoom ? `<a href="${clase.linkZoom}" target="_blank" class="btn-zoom">Unirse al Vivo por Zoom</a>` : '<p style="color:#777; width: 100%; text-align:center; margin-bottom: 15px;">Enlace de Zoom aún no cargado</p>'}
                                ${btnRecursosHTML}
                            </div>
                        </div>`;
                }

                let listaObjetivos = clase.objetivos.map(obj => obj.trim() ? `<li>${obj.trim()}</li>` : '').join("");

                seccion.innerHTML = `
                    ${bloqueAcceso}
                    <div class="info-clase">
                        ${clase.libro ? `<p><b>Libro eje de estudio:</b> ${clase.libro}</p>` : ''}
                        <h3>Introducción Conceptual</h3>
                        <p>${clase.introduccion || 'Sin descripción conceptual cargada.'}</p>
                        ${listaObjetivos ? `<h3>Objetivos de la Clase</h3><ul>${listaObjetivos}</ul>` : ''}
                        <h3>Ejes de Trabajo</h3>
                        <p>${clase.ejes || 'No se detallaron ejes temáticos.'}</p>
                        
                        ${esModoEditor ? `<button type="button" onclick="activarModoEditarClase('${clase.id}')" style="margin-top:30px; background:#8e44ad; color:white; padding:10px 20px; border:none; border-radius:50px; font-family:'Quicksand'; font-weight:bold; cursor:pointer;">✏️ Editar este encuentro</button>` : ''}
                    </div>
                `;
                mainContainer.appendChild(seccion);
            });
        }

        function toggleMenu() { document.getElementById('sidebar').classList.toggle('abierta'); document.getElementById('overlay').classList.toggle('activa'); }

        function mostrarSeccion(id, elementoMenu) {
            document.querySelectorAll('.seccion-contenido').forEach(s => s.classList.remove('activa'));
            const objetivo = document.getElementById(id);
            if(objetivo) objetivo.classList.add('activa');
            
            document.querySelectorAll('.item-encuentro').forEach(i => i.classList.remove('activo'));
            elementoMenu.classList.add('activo');
            if(window.innerWidth < 900) toggleMenu();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function verificarAcceso() {
            if (document.getElementById('input-password').value === "holismo2026") {
                sessionStorage.setItem("accesoPermitido", "true");
                document.getElementById('puerta-acceso').style.display = "none";
            } else { document.getElementById('error-msg').style.display = "block"; }
        }
    </script>
</body>
</html>
