<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generador de Apuntes | Holismo</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* --- ESTILOS PARA LA PANTALLA --- */
        body { font-family: 'Quicksand', sans-serif; background: #f0f0f0; padding: 50px; margin: 0; }
        .editor-container { max-width: 850px; margin: 0 auto; background: white; padding: 50px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .controles { margin-bottom: 30px; border-bottom: 1px solid #eee; padding-bottom: 20px; }
        
        #area-edicion {
            width: 100%; min-height: 500px; border: 1px solid #eee; padding: 30px;
            font-family: 'Lora', serif; font-size: 18px; line-height: 1.6; text-align: justify;
            outline: none; border-radius: 10px; background: #fafafa;
        }

        .btn-descargar {
            background: #8DA18E; color: white; border: none; padding: 12px 25px;
            border-radius: 50px; cursor: pointer; font-weight: bold; transition: 0.3s;
        }

        /* --- ESTILOS PARA EL PDF (Márgenes Blancos) --- */
        @media print {
            @page { 
                size: A4; 
                margin: 2.5cm !important; /* ESTO CREA EL BORDE BLANCO */
            }
            body { background: white !important; padding: 0 !important; margin: 0 !important; }
            .controles { display: none !important; } 
            
            .editor-container { 
                box-shadow: none !important; 
                width: 100% !important; 
                padding: 0 !important; 
                margin: 0 !important;
            }
            
            #area-edicion { 
                border: none !important; 
                padding: 0 !important; 
                background: white !important;
                font-size: 12pt !important;
            }

            .pdf-header { 
                display: flex !important; 
                flex-direction: column;
                align-items: center;
                margin-bottom: 40px !important; 
                border-bottom: 1px solid #E5A88A !important; 
                padding-bottom: 20px !important; 
            }
            .pdf-header img { height: 70px !important; margin-bottom: 10px !important; }
            
            h1 { font-family: 'Lora', serif; color: #3A7BD5 !important; font-size: 24pt !important; margin-top: 0 !important; }
            p { font-family: 'Lora', serif; line-height: 1.6 !important; text-align: justify !important; color: #333 !important; }
        }
        
        .pdf-header { display: none; }
    </style>
</head>
<body>

    <div class="editor-container">
        <div class="controles">
            <h2 style="font-family: 'Lora'; margin-top: 0; color: #3A7BD5;">Generador de Materiales Holismo</h2>
            <p style="font-size: 13px; color: #777;">Escribí tu texto y usá <b>Negrita</b> para resaltar.</p>
            <button class="btn-descargar" onclick="window.print()">Generar PDF con bordes</button>
        </div>

        <div class="pdf-header">
            <img src="logo.png" alt="Logo Holismo">
            <p style="font-family: 'Quicksand'; font-weight: 700; color: #E5A88A; font-size: 9pt; letter-spacing: 2px; text-transform: uppercase; margin: 0;">
                ACOMPAÑAR LA VIDA EN TODAS SUS DIMENSIONES
            </p>
        </div>

        <div id="area-edicion" contenteditable="true">
            <h1>Título del Taller</h1>
            <p>Al imprimir, verás que ahora el texto respeta los bordes blancos de 2.5cm. Esto evita que el contenido se vea amontonado o se corte en las impresoras.</p>
        </div>
    </div>

</body>
</html>
